spring.datasource.url=jdbc:mariadb://localhost:3306/pokemon_blog
spring.datasource.username=pokemon
spring.datasource.password=password123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Hibernate tự tạo bảng
spring.jpa.hibernate.ddl-auto=create-drop

# Xem SQL thực thi
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.pokemon.blog=DEBUG
logging.level.com.pokemon.blog.service=DEBUG
logging.level.com.pokemon.blog.repository=DEBUG

# Log file
logging.file.name=logs/blog.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n